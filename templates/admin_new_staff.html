{% extends "admin_base.html" %}

{% block title %}Add clinic staff — RabiesResQ{% endblock %}

{% block main_content %}
  <section class="mt-6 flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
    <div>
      <h1 class="text-2xl font-bold text-blue-900 sm:text-4xl">Add clinic staff</h1>
      <p class="mt-1 text-slate-500">{{ clinic.name if clinic else '—' }}</p>
    </div>
    <a href="{{ url_for('admin_users') }}" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">Back to User Management</a>
  </section>

  <form
    method="post"
    action="{{ url_for('admin_new_staff') }}"
    class="mx-auto mt-6 w-full max-w-2xl space-y-4 rounded-2xl border border-slate-200 bg-white p-6"
    data-confirm="Create this staff account? A temporary password will be generated and emailed if email sending is configured."
  >
    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Username <span class="text-red-500">*</span></label>
        <input type="text" name="username" value="{{ form_username|default('') }}" required class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm outline-none ring-emerald-300 transition focus:ring" autocomplete="username" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Email <span class="text-red-500">*</span></label>
        <input type="email" name="email" value="{{ form_email|default('') }}" required class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm outline-none ring-emerald-300 transition focus:ring" autocomplete="email" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Employee ID <span class="text-red-500">*</span></label>
        <input type="text" name="employee_id" value="{{ form_employee_id|default('') }}" required class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm outline-none ring-emerald-300 transition focus:ring" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Title <span class="text-red-500">*</span></label>
        <select name="title" required class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm outline-none ring-emerald-300 transition focus:ring">
          <option value="">—</option>
          <option value="Doctor" {% if (form_title|default('')) == 'Doctor' %}selected{% endif %}>Doctor</option>
          <option value="Nurse" {% if (form_title|default('')) == 'Nurse' %}selected{% endif %}>Nurse</option>
        </select>
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">First name</label>
        <input type="text" name="first_name" value="{{ form_first_name|default('') }}" class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm outline-none ring-emerald-300 transition focus:ring" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Last name</label>
        <input type="text" name="last_name" value="{{ form_last_name|default('') }}" class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm outline-none ring-emerald-300 transition focus:ring" />
      </div>
      <div class="md:col-span-2">
        <label class="mb-1 block text-sm font-medium text-slate-700">License number (optional)</label>
        <input type="text" name="license_number" value="{{ form_license_number|default('') }}" class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm outline-none ring-emerald-300 transition focus:ring" />
      </div>
    </div>
    <p class="text-xs text-slate-500">Credentials are automatically sent by email upon account creation.</p>
    <div class="flex flex-col-reverse justify-end gap-2 pt-2 sm:flex-row">
      <button type="submit" class="rounded-xl bg-emerald-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-emerald-700">Create staff account</button>
    </div>
  </form>
{% endblock %}
