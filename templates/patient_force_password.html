<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Update Password - RabiesResQ</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}?v=4" />
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}?v=4" />
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}?v=4" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}?v=4" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-[#1A4D2E]">
    <div class="mx-auto flex min-h-screen max-w-xl items-center px-4 py-10">
      <div class="w-full rounded-[2rem] border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-[#1A4D2E]">Update Your Password</h1>
        <p class="mt-1 text-sm text-slate-500">
          Your account uses a temporary password. Please set a new password to continue.
        </p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="mt-4 space-y-2">
              {% for category, message in messages %}
                <div class="rounded-lg px-3 py-2 text-sm {{ 'bg-red-100 text-red-700' if category == 'error' else 'bg-[#1A4D2E]/10 text-[#1A4D2E]' }}">
                  {{ message }}
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="post" class="mt-5 space-y-4">
          <div>
            <label class="mb-1 block text-sm text-slate-600">New Password</label>
            <div class="relative">
              <input id="patient-force-new-password" type="password" name="new_password" required class="w-full rounded-xl border border-slate-300 px-4 py-2.5 pr-12 outline-none ring-[#1A4D2E]/30 focus:ring" />
              <button
                type="button"
                class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-[#1A4D2E] transition-colors"
                data-toggle-password="patient-force-new-password"
                aria-label="Show password"
                aria-pressed="false"
              >
                <svg class="eye-open h-5 w-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
                <svg class="eye-closed h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path>
                </svg>
              </button>
            </div>
          </div>
          <div>
            <label class="mb-1 block text-sm text-slate-600">Confirm Password</label>
            <div class="relative">
              <input id="patient-force-confirm-password" type="password" name="confirm_password" required class="w-full rounded-xl border border-slate-300 px-4 py-2.5 pr-12 outline-none ring-[#1A4D2E]/30 focus:ring" />
              <button
                type="button"
                class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-[#1A4D2E] transition-colors"
                data-toggle-password="patient-force-confirm-password"
                aria-label="Show password"
                aria-pressed="false"
              >
                <svg class="eye-open h-5 w-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
                <svg class="eye-closed h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path>
                </svg>
              </button>
            </div>
          </div>
          <button type="submit" class="rounded-xl bg-[#1A4D2E] px-5 py-2.5 text-sm font-semibold text-white hover:bg-[#1A4D2E]">
            Save New Password
          </button>
        </form>
      </div>
    </div>
    <script src="{{ url_for('static', filename='js/password_toggle.js') }}"></script>
  </body>
</html>
