<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password - RabiesResQ</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}?v=4" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}?v=4" />
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}?v=4" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}?v=4" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }

    .bg-phthalo {
      background-color: #1A4D2E;
    }

    .text-phthalo {
      color: #1A4D2E;
    }

    .border-phthalo {
      border-color: #1A4D2E;
    }

    .ring-phthalo {
      --tw-ring-color: #1A4D2E;
    }

    .hover-bg-phthalo:hover {
      background-color: #0d281b;
    }
  </style>
</head>

<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4 sm:p-6">
  <div class="w-full max-w-5xl bg-white rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col lg:flex-row">

    <!-- Left Panel: Brand & Illustration (Unified with Login) -->
    <div class="lg:w-5/12 bg-phthalo p-8 sm:p-12 flex flex-col justify-between relative overflow-hidden">
      <div class="absolute top-0 left-0 w-64 h-64 bg-white/5 rounded-full -translate-x-1/2 -translate-y-1/2"></div>
      <div class="absolute bottom-0 right-0 w-96 h-96 bg-white/5 rounded-full translate-x-1/4 translate-y-1/4"></div>

      <div class="relative z-10">
        <div class="flex items-center gap-3">
          <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-white text-phthalo shadow-lg">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
          </div>
          <span class="text-2xl font-bold text-white tracking-tight">RabiesResQ</span>
        </div>

        <div class="mt-12">
          <h1 class="text-3xl sm:text-4xl font-bold text-white leading-tight">
            Protecting <br />Your Account.
          </h1>
          <p class="mt-4 text-white/70 text-lg leading-relaxed max-w-sm">
            Security is our top priority. Follow the steps to safely recover your account access.
          </p>
        </div>
      </div>

      <div class="relative z-10 mt-12 flex justify-center lg:block">
        <div class="relative inline-block group">
          <!-- Matte 3D Clay-Style Syringe -->
          <div class="absolute -right-12 -top-16 z-20 h-[220px] w-48 animate-soft-float pointer-events-none transition-all duration-1000 group-hover:scale-105">
            <svg viewBox="0 0 100 160" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full filter drop-shadow-[0_25px_45px_rgba(0,0,0,0.15)]">
              <defs>
                <radialGradient id="matteBody" cx="40%" cy="30%" r="80%">
                  <stop offset="0%" stop-color="#ffffff" />
                  <stop offset="100%" stop-color="#e2e8f0" />
                </radialGradient>
                <linearGradient id="matteLiquid" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#34d399" />
                  <stop offset="100%" stop-color="#059669" />
                </linearGradient>
              </defs>
              <rect x="42" y="5" width="16" height="50" rx="8" fill="#94a3b8" />
              <rect x="35" y="5" width="30" height="8" rx="4" fill="#64748b" />
              <rect x="25" y="45" width="50" height="90" rx="20" fill="url(#matteBody)" stroke="#cbd5e1" stroke-width="0.5" />
              <rect x="30" y="70" width="40" height="55" rx="10" fill="url(#matteLiquid)" opacity="0.85" />
              <g stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0.3">
                <line x1="35" y1="65" x2="50" y2="65" />
                <line x1="35" y1="80" x2="50" y2="80" />
                <line x1="35" y1="95" x2="50" y2="95" />
                <line x1="35" y1="110" x2="50" y2="110" />
                <line x1="35" y1="125" x2="50" y2="125" />
              </g>
              <rect x="42" y="135" width="16" height="10" rx="3" fill="#cbd5e1" />
              <rect x="49" y="145" width="2" height="15" rx="1" fill="#94a3b8" />
            </svg>
          </div>
          
          <img src="{{ url_for('static', filename='images/login-illustration.png') }}" alt="Medical Illustration"
            class="relative w-full max-w-[420px] lg:max-w-none transform hover:scale-105 transition duration-500 filter drop-shadow-[0_0_20px_rgba(255,255,255,0.3)]" />
        </div>
      </div>

      <style>
        @keyframes soft-float {
          0% { transform: translateY(0px); }
          50% { transform: translateY(-12px); }
          100% { transform: translateY(0px); }
        }
        .animate-soft-float {
          animation: soft-float 7s ease-in-out infinite;
        }
      </style>

      <div class="relative z-10 mt-12 text-white/50 text-sm">
        © 2026 RabiesResQ System. All rights reserved.
      </div>
    </div>

    <!-- Right Panel: Forgot Password Form -->
    <div class="lg:w-7/12 p-8 sm:p-12 lg:p-16 flex flex-col justify-center bg-white">
      <div class="max-w-md w-full mx-auto">
        <div class="mb-10 text-center lg:text-left">
          <h2 class="text-3xl font-bold text-[#1A4D2E] tracking-tight">Forgot Password</h2>
          <p class="text-slate-500 mt-2">Enter your email to receive a verification code.</p>
        </div>

        {% include "_flash.html" %}

        <form class="space-y-6" method="post" action="{{ url_for('auth.forgot_password_request') }}" id="forgot-password-form">
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700 ml-1">Email Address</label>
            <div class="relative group">
              <div
                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-phthalo transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207">
                  </path>
                </svg>
              </div>
              <input
                class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-[2rem] text-[#1A4D2E] focus:bg-white focus:border-phthalo focus:ring-4 focus:ring-phthalo/5 focus:outline-none transition-all"
                type="email" name="email" value="{{ email or '' }}" placeholder="name@example.com" required autocomplete="email" />
            </div>
          </div>

          <button
            class="w-full bg-phthalo text-white py-4 px-6 rounded-[2rem] font-bold text-lg shadow-lg shadow-phthalo/20 hover:bg-opacity-90 transform hover:-translate-y-0.5 transition-all duration-200 active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed"
            type="submit" id="send-code-btn">
            Send Code
          </button>

          <div class="pt-6 text-center text-slate-600 font-semibold">
            <a class="text-phthalo hover:underline" href="{{ url_for('auth.login') }}">
              Back to login
            </a>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script>
    document.getElementById('forgot-password-form').addEventListener('submit', function() {
      var btn = document.getElementById('send-code-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';
    });
  </script>
</body>

</html>
