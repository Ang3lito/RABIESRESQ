<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password - RabiesResQ</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}?v=4" />
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}?v=4" />
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}?v=4" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}?v=4" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-[#1A4D2E]">
    <div class="min-h-screen lg:grid lg:grid-cols-2">
      <div class="relative hidden lg:block">
        <div
          class="absolute inset-0 bg-cover bg-center"
          style="background-image: url('https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&w=1600&q=80');"
        ></div>
        <div class="absolute inset-0 bg-slate-900/40"></div>
        <div class="relative flex h-full items-center">
          <div class="px-14">
            <h1 class="text-4xl font-bold tracking-tight text-white">RabiesResQ Clinic</h1>
            <p class="mt-3 max-w-md text-lg text-white/90">
              Dedicated to the health and safety of our community.
            </p>
          </div>
        </div>
      </div>

      <div class="flex min-h-screen items-center justify-center px-6 py-10 lg:px-12">
        <div class="w-full max-w-md">
          <div class="text-center">
            <div class="text-2xl font-semibold text-[#1A4D2E]">RabiesResQ</div>
            <div class="mt-2 text-3xl font-extrabold tracking-tight text-[#1A4D2E]">Reset Password</div>
            <p class="mt-3 text-base text-slate-600">Set a new password for your account (at least 8 characters).</p>
          </div>

          <div class="mt-8 rounded-[2rem] border border-slate-200 bg-white p-8 shadow-lg shadow-slate-200/60">
            {% include "_flash.html" %}

            <form class="space-y-6" method="post" action="{{ url_for('auth.forgot_password_reset_post') }}" id="reset-form">
              <input type="hidden" name="token" value="{{ token or '' }}" />
              <div>
                <label class="block text-sm font-semibold text-slate-800">New Password</label>
                <div class="relative mt-2">
                  <input
                    id="reset-new-password"
                    class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 pr-12 text-[#1A4D2E] placeholder:text-slate-400 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200"
                    type="password"
                    name="password"
                    placeholder="Enter new password"
                    minlength="8"
                    required
                    autocomplete="new-password"
                  />
                  <button
                    type="button"
                    class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-[#1A4D2E] transition-colors"
                    data-toggle-password="reset-new-password"
                    aria-label="Show password"
                    aria-pressed="false"
                  >
                    <svg class="eye-open h-5 w-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    <svg class="eye-closed h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path>
                    </svg>
                  </button>
                </div>
              </div>

              <div>
                <label class="block text-sm font-semibold text-slate-800">Confirm New Password</label>
                <div class="relative mt-2">
                  <input
                    id="reset-confirm-password"
                    class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 pr-12 text-[#1A4D2E] placeholder:text-slate-400 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200"
                    type="password"
                    name="confirm_password"
                    placeholder="Confirm new password"
                    minlength="8"
                    required
                    autocomplete="new-password"
                  />
                  <button
                    type="button"
                    class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-[#1A4D2E] transition-colors"
                    data-toggle-password="reset-confirm-password"
                    aria-label="Show password"
                    aria-pressed="false"
                  >
                    <svg class="eye-open h-5 w-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    <svg class="eye-closed h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path>
                    </svg>
                  </button>
                </div>
              </div>

              <button
                class="w-full rounded-xl bg-[#1A4D2E] px-4 py-3 text-base font-semibold text-white shadow-sm hover:bg-[#1A4D2E] focus:outline-none focus:ring-4 focus:ring-[#1A4D2E] disabled:opacity-70 disabled:cursor-not-allowed"
                type="submit"
                id="reset-btn"
              >
                Reset Password
              </button>

              <div class="text-center text-sm font-semibold text-slate-700">
                <a class="hover:text-[#1A4D2E]" href="{{ url_for('auth.login') }}">Back to login</a>
              </div>
            </form>
          </div>

          <div class="mt-10 text-center text-sm text-slate-500">
            Â© 2026 RabiesResQ. All rights reserved.
          </div>
        </div>
      </div>
    </div>
    <script src="{{ url_for('static', filename='js/password_toggle.js') }}"></script>
    <script>
      document.getElementById('reset-form').addEventListener('submit', function() {
        var btn = document.getElementById('reset-btn');
        btn.disabled = true;
        btn.textContent = 'Updatingâ€¦';
      });
    </script>
  </body>
</html>
